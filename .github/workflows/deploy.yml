# Workflow para deploy automático no GitHub Pages
name: Deploy to GitHub Pages

# Quando executar o workflow
on:
  # Executar quando houver push na branch main
  push:
    branches: [ main ]
  
  # Permitir execução manual do workflow
  workflow_dispatch:

# Permissões necessárias para o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permitir apenas um deploy por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job de build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload do artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Fazer upload de todo o repositório
          path: '.'
          
  # Job de deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4